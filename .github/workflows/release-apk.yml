name: Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git zip unzip openjdk-17-jdk python3-pip

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel virtualenv
          python -m pip install buildozer

      - name: Build signed APK
        working-directory: python_app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            export P4A_RELEASE_KEYSTORE=release.keystore
            export P4A_RELEASE_KEYSTORE_PASSWORD="$KEYSTORE_PASSWORD"
            export P4A_RELEASE_KEYALIAS="$KEY_ALIAS"
            export P4A_RELEASE_KEYPASSWORD="$KEY_PASSWORD"
            buildozer -v android release
          else
            buildozer -v android debug
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoneyMate-Release-APK
          path: python_app/bin/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: python_app/bin/*.apk
          generate_release_notes: true
